services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  embedder:
    build: ./pyhton_core
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    environment:
      SERVER_PORT: "8000"
      UPLOAD_DIR: "/app/uploads"
      QDRANT_HOST: "qdrant"
      QDRANT_GRPC_PORT: "6334"
      QDRANT_COLLECTION: "documents"
      QDRANT_VECTOR_SIZE: "768"
      EMBEDDER_URL: "http://embedder:5000"
      EMBEDDER_BATCH_SIZE: "64"
      EMBEDDER_TIMEOUT_SEC: "300"
      CHUNK_SIZE: "500"
      CHUNK_OVERLAP: "100"
      CHUNK_MIN_LEN: "20"
      SIMILARITY_THRESHOLD: "0.88"
    depends_on:
      qdrant:
        condition: service_started
      embedder:
        condition: service_healthy

volumes:
  uploads:
